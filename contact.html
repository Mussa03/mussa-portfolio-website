<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional portfolio of Mussa njechelani, Creative Photoshop & A&B Scale Developer">
    <meta name="keywords" content="portfolio, web development, design, Photoshop, developer">
    <meta name="author" content="Mussa Njechelani">
    <title>Contact Me | Mussa Njechelani</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="light-mode">
    <header>
        <div class="container">
            <div class="logo">
                <img src="njechelani logo 3.png" alt="Mussa Njechelani Logo">
            </div>
            <nav id="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li class="current"><a href="contact.html">Contact</a></li>
                    <li><a href="survey.html">Survey</a></li>
                </ul>
            </nav>
            <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i> Dark Mode</button>
            <button id="mobile-menu-button" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <section id="contact">
        <div class="container">
            <h1>Contact Me</h1>
            <div class="contact-container">
                <div class="contact-info">
                    <h2><i class="fas fa-envelope"></i> Get In Touch</h2>
                    <p>Feel free to reach out for collaborations or just to say hello!</p>
                    
                    <div class="contact-method">
                        <i class="fas fa-map-marker-alt"></i>
                        <p>DODOMA TANZANIA</p>
                    </div>
                    <div class="contact-method">
                        <i class="fas fa-phone"></i>
                        <p>0620798429</p>
                    </div>
                    <div class="contact-method">
                        <i class="fas fa-envelope"></i>
                        <p>mussanjechelani@gmail.com</p>
                    </div>
                    
                    <div class="social">
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                        <a href="#"><i class="fab fa-github"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
                
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone:</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890">
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <select id="subject" name="subject">
                            <option value="work">Work Inquiry</option>
                            <option value="collab">Collaboration</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 Mussa njechelani. All rights reserved.</p>
            <div class="social">
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Form validation
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }
            
            const phone = document.getElementById('phone').value;
            if (phone && !/^\d{3}-\d{3}-\d{4}$/.test(phone)) {
                alert('Please enter a valid phone number in the format 123-456-7890.');
                return;
            }
            
            alert('Thank you for your message! I will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
